apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec:
      serviceAccountName: ai-backend-sa   # 🔥 CRITICAL LINE
      containers:
        - name: backend
          image: ai-backend
          imagePullPolicy: Never
          ports:
            - containerPort: 8000